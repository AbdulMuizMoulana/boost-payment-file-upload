[pytest]
markers =
    optionalhook: marks tests related to optional hooks
    smoke: marks smoke tests
    regression: marks regression tests
    skip :skip the test case
    uat : Running in UAT Environment


# tell pytest to collect files starting with Test
python_files = Test*.py test_*.py

# classes starting with Test
python_classes = Test*

# functions starting with test_
python_functions = test_*

# Console logs
log_cli = true
log_cli_level = INFO
log_cli_format = %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ⭐ Logs for HTML report
log_level = INFO
log_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Make report portable
addopts = --self-contained-html
