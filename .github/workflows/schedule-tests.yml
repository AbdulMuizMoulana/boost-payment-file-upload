name: Scheduled — Boost File Upload Tests

on:
  schedule:
    # 11:15 AM IST = 05:45 UTC (Mon–Fri)
    - cron: '45 5 * * 1-5'

  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: "DEV"
        type: choice
        options:
          - DEV
          - UAT

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [DEV, UAT]   # Runs BOTH daily (remove if single env)

    env:
      #  ENV used by ReadConfig
      ENV: ${{ matrix.environment }}

      HEADLESS: "true"
      IMPLICIT_WAIT: "5"
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "--log-cli-level=INFO"

      #  GitHub Secrets (Your names)
      DEV_USERNAME: ${{ secrets.DEV_USERNAME }}
      DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
      DEV_URL: ${{ secrets.DEV_URL }}

      UAT_USERNAME: ${{ secrets.UAT_USERNAME }}
      UAT_PASSWORD: ${{ secrets.UAT_PASSWORD }}
      UAT_URL: ${{ secrets.UAT_URL }}

    steps:
      - name: Debug environment
        run: |
          echo "Running tests on ENV = $ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run tests (pytest)
        id: tests
        continue-on-error: true
        run: |
          mkdir -p Reports screenshots
          pytest -v -s tests/ \
            --html=Reports/pytest-report.html \
            --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report-${{ matrix.environment }}
          path: Reports/pytest-report.html
          if-no-files-found: error

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.environment }}
          path: screenshots/**
          if-no-files-found: ignore

      #  EMAIL ONLY IF FAILED
      - name: Send Email if Tests Failed
        if: steps.tests.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "❌ ${{ matrix.environment }} Tests FAILED"

          to: abdul.muyeez@tibilsolutions.com
          from: GitHub Actions

          body: |
            Scheduled tests FAILED ❌

            Environment: ${{ matrix.environment }}
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}

            Check artifacts for report.


